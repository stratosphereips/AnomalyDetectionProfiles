# Shared values. Command-line --sensitivity and --training-hours override these.
[common]
training_hours = 1
sensitivity = 0.5
ignore_multicast_broadcast = true

# Terminal and log presentation.
[output]
color = always
show_terminal_data = false
quiet = false

# Unified all-protocol detector, including specialized SSL flow detection.
[multi_protocol]
output_dir = multi_protocol_ad_output
minimum_points = 3
threshold = 3.5
threshold_quantile = 0.995
drift_alpha = 0.05
suspicious_alpha = 0.005
adaptation_score = 8.0
protocol_score_cap = 10.0
global_threshold = 0.65
minimum_protocols = 2
corroboration_bonus = 0.15
corroboration_bonus_cap = 0.30
max_responsible_flows = 10
ssl_hourly_threshold = 3.5
ssl_flow_threshold = 3.5
ssl_novelty_threshold = 1.5
ssl_baseline_alpha = 0.10
ssl_max_small_anomalies = 2
